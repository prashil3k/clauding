<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>한걸음 — Hangeoroeum</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F5F3EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="writing.png">
  <link rel="apple-touch-icon" href="writing.png">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F5F3EE;
      --text: #141210;
      --text-secondary: #4A4540;
      --text-tertiary: #8A847A;
      --accent: #4A5568;
      --accent-warm: #6B5B4E;
      --surface: #EBE8E2;
      --surface-hover: #E2DED7;
      --border: #DDD8D0;
      --correct: #4A7C59;
      --correct-bg: #EDF5F0;
      --incorrect: #A0522D;
      --incorrect-bg: #FDF2EC;
      --max-w: 480px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .serif { font-family: 'Instrument Serif', Georgia, serif; }
    .korean {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      word-break: keep-all;
    }
    .korean-large {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      font-size: 26px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      word-break: keep-all;
    }
    .korean-medium {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.5;
      word-break: keep-all;
    }
    .english-sub {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .app-container {
      width: 100%;
      max-width: var(--max-w);
      padding: 0 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .fade-up { animation: fadeUp 0.35s ease-out forwards; }
    .fade-up-delay { opacity: 0; animation: fadeUp 0.35s ease-out 0.1s forwards; }
    .fade-up-delay-2 { opacity: 0; animation: fadeUp 0.35s ease-out 0.2s forwards; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-primary {
      display: block; width: 100%; padding: 16px 24px;
      background: var(--text); color: var(--bg); border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    .btn-secondary {
      display: block; width: 100%; padding: 14px 24px;
      background: transparent; color: var(--text-secondary);
      border: 1.5px solid var(--border); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:active { background: var(--surface); transform: scale(0.98); }

    .btn-ghost {
      background: none; border: none; color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; padding: 8px 12px; border-radius: 8px;
      transition: background 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .btn-ghost:active { background: var(--surface); }

    .btn-detect {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; color: var(--text-secondary); cursor: pointer;
      transition: background 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .btn-detect:active { background: var(--surface-hover); }
    .btn-detect:disabled { opacity: 0.5; cursor: not-allowed; }

    .speaker-btn {
      background: none; border: 1.5px solid var(--border); border-radius: 50%;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .speaker-btn:active { background: var(--surface); }
    .speaker-btn.loading { opacity: 0.5; pointer-events: none; }
    .speaker-btn svg { width: 18px; height: 18px; color: var(--text-secondary); }

    .mc-option {
      display: block; width: 100%; text-align: left; padding: 14px 18px;
      background: white; border: 1.5px solid var(--border); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 16px; cursor: pointer;
      transition: border-color 0.2s, background 0.15s; line-height: 1.4;
      -webkit-tap-highlight-color: transparent;
    }
    .mc-option:active { background: var(--surface); }
    .mc-option.correct { border-color: var(--correct); background: var(--correct-bg); }
    .mc-option.incorrect { border-color: var(--incorrect); background: var(--incorrect-bg); }
    .mc-option.reveal-correct { border-color: var(--correct); background: var(--correct-bg); }
    .mc-option.disabled { pointer-events: none; }

    .progress-track {
      width: 100%; height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent-warm);
      border-radius: 2px; transition: width 0.4s ease;
    }

    .phrase-item {
      padding: 16px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .phrase-item:last-child { border-bottom: none; }
    .phrase-item:active { opacity: 0.7; }

    .settings-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px;
      background: white; color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .settings-input:focus { border-color: var(--accent-warm); }

    .settings-select {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px;
      background: white; color: var(--text); outline: none; appearance: none;
      cursor: pointer; transition: border-color 0.2s;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238A847A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 16px center;
    }
    .settings-select:focus { border-color: var(--accent-warm); }

    .tap-reveal {
      display: inline-block; padding: 4px 14px; background: var(--surface);
      border-radius: 8px; font-size: 14px; color: var(--text-secondary);
      cursor: pointer; transition: background 0.2s; border: none;
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .tap-reveal:active { background: var(--surface-hover); }

    .topic-tag {
      display: inline-block; padding: 4px 10px; background: var(--surface);
      border-radius: 6px; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); letter-spacing: 0.02em;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .grammar-toggle {
      background: none; border: none; color: var(--text-tertiary);
      font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer;
      padding: 6px 0; display: flex; align-items: center; gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .grammar-toggle svg {
      width: 14px; height: 14px; transition: transform 0.2s;
    }
    .grammar-toggle.open svg { transform: rotate(90deg); }
    .grammar-content {
      font-size: 14px; color: var(--text-secondary); line-height: 1.6; padding: 8px 0 4px 0;
    }

    .scroll-area {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: calc(24px + var(--safe-bottom));
    }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; min-height: 56px;
    }
    .top-bar-title {
      font-family: 'Instrument Serif', Georgia, serif;
      letter-spacing: -0.02em;
    }

    .stats-row { display: flex; gap: 24px; padding: 12px 0; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

    .mastery-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }

    .collection-added {
      display: inline-block; padding: 6px 14px;
      background: var(--correct-bg); border: 1px solid #B8D8C6;
      border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--correct);
    }

    .phrase-detail { padding: 12px 0 8px 0; animation: fadeIn 0.2s ease-out; }
    .phrase-detail-row { display: flex; gap: 8px; padding: 6px 0; font-size: 14px; }
    .phrase-detail-label {
      color: var(--text-tertiary); font-weight: 500; min-width: 60px; flex-shrink: 0;
    }
    .phrase-detail-value { color: var(--text-secondary); line-height: 1.5; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    .settings-section { margin-bottom: 32px; }
    .settings-label {
      font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px;
      color: var(--text);
    }
    .settings-hint {
      font-size: 13px; color: var(--text-tertiary); margin-bottom: 12px; line-height: 1.5;
    }
    .settings-row {
      display: flex; gap: 8px; align-items: center; margin-top: 8px;
    }
    .detect-status {
      font-size: 12px; margin-top: 6px; line-height: 1.4;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(20,18,16,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 24px;
      animation: fadeIn 0.3s ease-out;
    }
    .modal-card {
      background: var(--bg); border-radius: 20px; width: 100%;
      max-width: 400px; max-height: 90vh; overflow-y: auto;
      padding: 36px 28px 28px; position: relative;
      animation: fadeUp 0.35s ease-out;
    }
    .welcome-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      display: block; border-radius: 14px;
    }
    .welcome-step-dots {
      display: flex; gap: 6px; justify-content: center; margin-bottom: 28px;
    }
    .welcome-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); transition: background 0.3s;
    }
    .welcome-dot.active { background: var(--accent-warm); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin></script>
  <script src="sessions.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    /* ── Storage ─────────────────────────────────────────────────── */
    function load(key, fallback) {
      try { const v = localStorage.getItem('hgr_' + key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    function save(key, value) {
      try { localStorage.setItem('hgr_' + key, JSON.stringify(value)); } catch {}
    }
    function useStorage(key, fallback) {
      const [val, setVal] = useState(() => load(key, fallback));
      const set = useCallback(v => {
        const next = typeof v === 'function' ? v(load(key, fallback)) : v;
        setVal(next);
        save(key, next);
      }, [key]);
      return [val, set];
    }

    /* ── SM-2 Spaced Repetition ──────────────────────────────────── */
    function sm2(quality, card) {
      let { reps = 0, ef = 2.5, interval = 0 } = card;
      if (quality >= 3) {
        if (reps === 0) interval = 1;
        else if (reps === 1) interval = 6;
        else interval = Math.round(interval * ef);
        reps++;
      } else {
        reps = 0;
        interval = 1;
      }
      ef = Math.max(1.3, ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
      const nextReview = Date.now() + interval * 86400000;
      return { reps, ef: Math.round(ef * 100) / 100, interval, nextReview };
    }

    function getMasteryColor(card) {
      if (!card || !card.reps) return 'rgba(20,18,16,0.15)';
      if (card.interval >= 21) return 'rgba(20,18,16,1)';
      if (card.interval >= 7) return 'rgba(20,18,16,0.75)';
      if (card.reps >= 2) return 'rgba(20,18,16,0.5)';
      return 'rgba(20,18,16,0.3)';
    }

    /* ── Gemini TTS Constants ────────────────────────────────────── */
    const KNOWN_TTS_MODELS = [
      'gemini-2.5-flash-preview-tts',
      'gemini-2.5-flash-lite-preview-tts',
      'gemini-2.5-pro-preview-tts',
    ];
    const DEFAULT_TTS_MODEL = 'gemini-2.5-flash-preview-tts';
    const TTS_VOICES = [
      { id: 'Kore', label: 'Kore', desc: 'clear, calm' },
      { id: 'Aoede', label: 'Aoede', desc: 'warm, expressive' },
      { id: 'Charon', label: 'Charon', desc: 'deep, steady' },
      { id: 'Puck', label: 'Puck', desc: 'bright, friendly' },
      { id: 'Fenrir', label: 'Fenrir', desc: 'low, rich' },
    ];
    const DEFAULT_VOICE = 'Kore';
    const MODEL_FALLBACKS = {
      'gemini-2.5-flash-preview-tts': 'gemini-2.5-flash-lite-preview-tts',
      'gemini-2.5-flash-lite-preview-tts': 'gemini-2.5-pro-preview-tts',
      'gemini-2.5-pro-preview-tts': 'gemini-2.5-flash-lite-preview-tts',
    };

    /* ── Migrate stale TTS model names ─────────────────────────── */
    (() => {
      const saved = load('ttsModel', '');
      if (saved && !KNOWN_TTS_MODELS.includes(saved)) {
        save('ttsModel', DEFAULT_TTS_MODEL);
      }
      const savedModels = load('ttsModels', null);
      if (savedModels) {
        const cleaned = savedModels.filter(m => !m.includes('2.0-flash-lite'));
        if (cleaned.length !== savedModels.length) save('ttsModels', cleaned.length > 0 ? cleaned : KNOWN_TTS_MODELS);
      }
    })();

    /* ── Audio cache (in-memory + IndexedDB persistence) ────────── */
    const audioCache = {};

    // IndexedDB for persistent TTS audio across page reloads
    const TTS_DB_NAME = 'hgr_tts_cache';
    const TTS_DB_VERSION = 1;
    const TTS_STORE = 'audio';

    function openTtsDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(TTS_DB_NAME, TTS_DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(TTS_STORE)) {
            db.createObjectStore(TTS_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbGet(key) {
      try {
        const db = await openTtsDb();
        return new Promise((resolve) => {
          const tx = db.transaction(TTS_STORE, 'readonly');
          const req = tx.objectStore(TTS_STORE).get(key);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => resolve(null);
        });
      } catch { return null; }
    }

    async function idbPut(key, blob) {
      try {
        const db = await openTtsDb();
        const tx = db.transaction(TTS_STORE, 'readwrite');
        tx.objectStore(TTS_STORE).put(blob, key);
      } catch { /* non-blocking */ }
    }

    /* ── PCM to WAV ──────────────────────────────────────────────── */
    function pcmToWav(base64Pcm, sampleRate = 24000) {
      const raw = atob(base64Pcm);
      const len = raw.length;
      const buf = new ArrayBuffer(44 + len);
      const view = new DataView(buf);
      function w(o, s) { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); }
      w(0, 'RIFF');
      view.setUint32(4, 36 + len, true);
      w(8, 'WAVE');
      w(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      w(36, 'data');
      view.setUint32(40, len, true);
      for (let i = 0; i < len; i++) view.setUint8(44 + i, raw.charCodeAt(i));
      return new Blob([buf], { type: 'audio/wav' });
    }

    /* ── Gemini TTS Call (with retry + IndexedDB persistence) ───── */
    async function callGeminiTTS(text, apiKey, model, voice, retries = 1) {
      const cacheKey = text + '|' + voice + '|' + model;

      // 1. In-memory cache (instant)
      if (audioCache[cacheKey]) return audioCache[cacheKey];

      // 2. IndexedDB cache (persists across reloads)
      const cached = await idbGet(cacheKey);
      if (cached) {
        const blobUrl = URL.createObjectURL(cached);
        audioCache[cacheKey] = blobUrl;
        return blobUrl;
      }

      // 3. Fetch from API
      for (let attempt = 0; attempt <= retries; attempt++) {
        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
          const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text }] }],
              generationConfig: {
                responseModalities: ['AUDIO'],
                speechConfig: {
                  voiceConfig: {
                    prebuiltVoiceConfig: { voiceName: voice }
                  }
                }
              }
            })
          });

          if (!resp.ok) {
            const err = await resp.text().catch(() => '');
            throw new Error(`TTS API ${resp.status}: ${err.slice(0, 200)}`);
          }

          const data = await resp.json();
          const part = data?.candidates?.[0]?.content?.parts?.[0];
          if (!part?.inlineData?.data) throw new Error('No audio in response');

          const wavBlob = pcmToWav(part.inlineData.data);
          const blobUrl = URL.createObjectURL(wavBlob);
          audioCache[cacheKey] = blobUrl;

          // Persist to IndexedDB (non-blocking)
          idbPut(cacheKey, wavBlob);

          return blobUrl;
        } catch (e) {
          if (attempt < retries) {
            await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
            continue;
          }
          throw e;
        }
      }
    }

    /* ── TTS with fallback ───────────────────────────────────────── */
    let currentAudio = null;
    let lastTtsSource = 'none'; // 'gemini' | 'gemini-fallback' | 'web-speech' | 'none'

    function playAudioToEnd(audio) {
      return new Promise((resolve) => {
        audio.addEventListener('ended', resolve, { once: true });
        audio.addEventListener('error', resolve, { once: true });
      });
    }

    async function speakKorean(text) {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }

      const apiKey = load('geminiKey', '');
      const model = load('ttsModel', DEFAULT_TTS_MODEL);
      const voice = load('ttsVoice', DEFAULT_VOICE);

      if (apiKey) {
        // Try primary model (with 1 retry built into callGeminiTTS)
        try {
          const url = await callGeminiTTS(text, apiKey, model, voice, 1);
          currentAudio = new Audio(url);
          const endPromise = playAudioToEnd(currentAudio);
          await currentAudio.play();
          lastTtsSource = 'gemini';
          await endPromise;
          return;
        } catch (e) {
          console.warn('Gemini TTS failed (with retry), trying fallback model:', e.message);
          const fallback = MODEL_FALLBACKS[model];
          if (fallback) {
            try {
              const url = await callGeminiTTS(text, apiKey, fallback, voice, 1);
              currentAudio = new Audio(url);
              const endPromise = playAudioToEnd(currentAudio);
              await currentAudio.play();
              lastTtsSource = 'gemini-fallback';
              await endPromise;
              return;
            } catch (e2) {
              console.warn('Fallback model also failed:', e2.message);
            }
          }
        }
      }

      // Web Speech API fallback
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ko-KR';
        u.rate = 0.85;
        const voices = window.speechSynthesis.getVoices();
        const ko = voices.find(v => v.lang.startsWith('ko'));
        if (ko) u.voice = ko;
        lastTtsSource = 'web-speech';
        await new Promise((resolve) => {
          u.onend = resolve;
          u.onerror = () => {
            lastTtsSource = 'none';
            resolve();
          };
          window.speechSynthesis.speak(u);
        });
      }
    }

    /* ── TTS Prefetch ─────────────────────────────────────────── */
    function prefetchSessionAudio(session) {
      const apiKey = load('geminiKey', '');
      if (!apiKey) return;
      const model = load('ttsModel', DEFAULT_TTS_MODEL);
      const voice = load('ttsVoice', DEFAULT_VOICE);
      session.phrases.forEach(p => {
        callGeminiTTS(p.korean, apiKey, model, voice, 1).catch(() => {
          // If primary fails during prefetch, try fallback model too
          const fallback = MODEL_FALLBACKS[model];
          if (fallback) callGeminiTTS(p.korean, apiKey, fallback, voice, 0).catch(() => {});
        });
      });
    }

    /* ── Detect Gemini Models ────────────────────────────────────── */
    async function detectGeminiModels(apiKey) {
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
      if (!resp.ok) throw new Error(`API ${resp.status}`);
      const data = await resp.json();
      const models = (data.models || [])
        .map(m => m.name.replace('models/', ''))
        .filter(n => n.includes('tts'));
      // Known models first, then any new ones discovered
      const known = KNOWN_TTS_MODELS.filter(m => models.includes(m));
      const extra = models.filter(m => !KNOWN_TTS_MODELS.includes(m));
      return [...known, ...extra];
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {

        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildInterestMapRegex(aboutText) {
      if (!aboutText || !aboutText.trim()) return null;
      const lower = aboutText.toLowerCase();
      const scores = {};
      Object.entries(TOPIC_KEYWORDS).forEach(([topic, keywords]) => {
        let score = 0;
        keywords.forEach(kw => {
          const regex = new RegExp('\\b' + kw.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b', 'gi');
          const matches = lower.match(regex);
          if (matches) score += matches.length;
        });
        if (score > 0) scores[topic] = score;
      });
      return Object.keys(scores).length > 0 ? scores : null;
    }

    // AI-powered interest mapping: sends About You text to Gemini,
    // gets back topic relevance scores. Cached in localStorage.
    async function buildInterestMapAI(aboutText) {
      const apiKey = load('geminiKey', '');
      if (!apiKey || !aboutText || !aboutText.trim()) return null;

      const topics = Object.keys(TOPIC_KEYWORDS);
      const prompt = `You are a Korean language learning app. The user described their interests below. Rate how relevant each topic is to them on a scale of 0-5 (0 = no relevance, 5 = strong match). Return ONLY a JSON object mapping topic names to scores, no explanation.

Topics: ${topics.join(', ')}

User's interests:
${aboutText.trim()}

Return format: {"topic": score, ...} — only include topics with score > 0.`;

      try {
        const resp = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.1 }
            })
          }
        );
        if (!resp.ok) throw new Error(`API ${resp.status}`);
        const data = await resp.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
        // Extract JSON from response (handles markdown code blocks)
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('No JSON in response');
        const scores = JSON.parse(jsonMatch[0]);
        // Validate: only keep known topics with numeric scores > 0
        const valid = {};
        topics.forEach(t => {
          if (typeof scores[t] === 'number' && scores[t] > 0) valid[t] = scores[t];
        });
        return Object.keys(valid).length > 0 ? valid : null;
      } catch (e) {
        console.warn('AI interest mapping failed, falling back to regex:', e.message);
        return null;
      }
    }

    function buildInterestMap(aboutText) {

    function getNonAnchorIds() {
      const skeletons = window.GRAMMAR_SKELETONS || {};

    function resolveSession(session) {

      const personalized = getPersonalizedSession(session.id);

    }

    // Generate personalized content for a batch of non-anchor sessions
    async function personalizeSessionBatch(sessionIds, userInterest, onProgress) {
      const apiKey = load('geminiKey', '');
      if (!apiKey) throw new Error('No Gemini API key');
      const sessions = window.SESSIONS || [];
      const skeletons = window.GRAMMAR_SKELETONS || {};
      const results = {};
      let completed = 0;

      // Process in batches of 3
      for (let i = 0; i < sessionIds.length; i += 3) {
        const batch = sessionIds.slice(i, i + 3);
        const batchData = batch.map(id => {
          const original = sessions.find(s => s.id === id);
          const sk = skeletons[id];
          return { id, original, skeleton: sk };
        }).filter(b => b.original && b.skeleton);

        if (batchData.length === 0) continue;

        const prompt = buildPersonalizationPrompt(batchData, userInterest);
        try {
          const resp = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.7 }
              })
            }
          );
          if (!resp.ok) throw new Error(`API ${resp.status}`);
          const data = await resp.json();
          const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
          const parsed = parsePersonalizationResponse(text, batchData);

          Object.entries(parsed).forEach(([id, session]) => {
            save(`personalized_${id}`, session);
            results[id] = session;
          });
        } catch (e) {
          console.warn(`Personalization batch failed (sessions ${batch.join(',')}):`, e.message);
          // Skip this batch — sessions fall back to defaults
        }

        completed += batchData.length;
        if (onProgress) onProgress(completed, sessionIds.length);
      }

      return results;
    }

    function buildPersonalizationPrompt(batchData, userInterest) {
      const sessionsDesc = batchData.map(({ id, original, skeleton }) => {
        const band = id <= 20 ? 'Band 1 (TOPIK 1 basics)' : id <= 40 ? 'Band 2 (TOPIK 1 extended)' : 'Band 3 (TOPIK 2)';
        return `Session ${id} (${band}, level: ${original.level}):
  Grammar points: ${skeleton.grammar.join('; ')}
  Key vocabulary: ${skeleton.keyVocab.join(', ')}
  Original topic: ${original.topic}
  Notes: ${skeleton.notes}`;
      }).join('\n\n');

      return `You are generating content for a Korean language learning app. The user is interested in: "${userInterest}"

For each session below, create a personalized version themed around the user's interest. You MUST:
1. Use ALL the specified grammar points in the phrases
2. Use the key vocabulary
3. Stay within the TOPIK level — do NOT use grammar/vocab above the session's level
4. Create exactly 5 phrases per session
5. Write a scene (2-3 sentences) grounded in the user's interest
6. Each phrase needs: korean, english, context (1 short sentence), grammar (explain the grammar point used)
7. The first phrase (focusIndex 0) should be the most important one for the grammar point

If the user's interest doesn't fit naturally with a session's grammar, use the original topic instead — don't force it.

Sessions to personalize:

${sessionsDesc}

Return a JSON array of objects, one per session, in this EXACT format:
[
  {
    "id": 25,
    "topic": "short-topic-name",
    "topicKorean": "토픽이름",
    "scene": "Scene description...",
    "phrases": [
      { "korean": "한국어 문장.", "english": "English translation.", "context": "When to use this", "grammar": "Grammar explanation" },
      ... (5 phrases total)
    ]
  }
]

Return ONLY the JSON array, no explanation.`;
    }

    function parsePersonalizationResponse(text, batchData) {
      const results = {};
      try {
        // Extract JSON array from response
        const jsonMatch = text.match(/\[[\s\S]*\]/);
        if (!jsonMatch) throw new Error('No JSON array in response');
        const arr = JSON.parse(jsonMatch[0]);

        arr.forEach(item => {
          const bd = batchData.find(b => b.id === item.id);
          if (!bd) return;

          // Validate required fields
          if (!item.scene || !Array.isArray(item.phrases) || item.phrases.length < 3) return;

          // Build valid session object matching existing format
          const phrases = item.phrases.slice(0, 5).map((p, i) => ({
            id: `s${item.id}p${i + 1}`,
            korean: p.korean || '',
            english: p.english || '',
            context: p.context || '',
            grammar: p.grammar || null
          }));

          // Skip if any phrase is missing korean/english
          if (phrases.some(p => !p.korean || !p.english)) return;

          results[item.id] = {
            id: item.id,
            topic: item.topic || bd.original.topic,
            topicKorean: item.topicKorean || bd.original.topicKorean,
            level: bd.original.level,
            scene: item.scene,
            focusIndex: 0,
            phrases,
            _personalized: true  // marker for UI
          };
        });
      } catch (e) {
        console.warn('Failed to parse personalization response:', e.message);
      }
      return results;
    }

    // Clear all personalized sessions
    function clearPersonalizedSessions() {

    function getOrderedSessions(completedIds, interestMap) {
      const sessions = window.SESSIONS || [];
      const remaining = sessions.filter(s => !completedIds.includes(s.id));
      if (remaining.length === 0) return remaining;
      if (!interestMap) return remaining;

      // Band-based reordering: reorder by interest WITHIN difficulty bands,
      // but always complete earlier bands before moving to later ones.
      // Bands: 1-20 (TOPIK 1 basics), 21-40 (TOPIK 1 extended), 41-60 (TOPIK 2)
      const bands = [
        remaining.filter(s => s.id <= 20),
        remaining.filter(s => s.id > 20 && s.id <= 40),
        remaining.filter(s => s.id > 40),
      ];

      const sortByInterest = (arr) => [...arr].sort((a, b) => {
        const scoreA = interestMap[a.topic] || 0;
        const scoreB = interestMap[b.topic] || 0;
        if (scoreB !== scoreA) return scoreB - scoreA;
        return a.id - b.id;
      });

      // Return sessions from the first non-empty band (interest-sorted),
      // then the next band, etc.
      return bands.flatMap(sortByInterest);
    }

    // Detect loanwords (katakana-style Korean transcriptions of English words)
    const LOANWORD_PAIRS = (() => {
      const pairs = {};
      ALL_PHRASES.forEach(p => {
        // Extract likely loanwords: Korean text containing common loanword patterns
        const koWords = p.korean.replace(/[.,!?]/g, '').split(/\s+/);
        const enWords = p.english.toLowerCase().replace(/[.,!?'"]/g, '').split(/\s+/);
        koWords.forEach(kw => {
          enWords.forEach(ew => {
            // Simple heuristic: if Korean word is 3+ chars and English word is 4+ chars
            // and they look like transliterations (both start with similar sounds)
            if (kw.length >= 3 && ew.length >= 4) {
              pairs[kw] = ew;
            }
          });
        });
      });
      return pairs;
    })();

    function hasLoanwordOverlap(correctText, distractorText) {
      // Check if distractor shares obvious loanword-derived keywords with correct answer
      const cWords = correctText.toLowerCase().replace(/[.,!?'"]/g, '').split(/\s+/);
      const dWords = distractorText.toLowerCase().replace(/[.,!?'"]/g, '').split(/\s+/);
      // If correct answer contains a distinctive English loanword, reject distractors that also contain it
      const loanwords = ['americano', 'latte', 'decaf', 'wifi', 'outlet', 'protein', 'ramyeon',
        'kimbap', 'kimchi', 'taxi', 'bus', 'coffee', 'cappuccino', 'espresso', 'cream',
        'cheese', 'pizza', 'pasta', 'chocolate', 'cake', 'ice', 'hot dog', 'sandwich',
        'smartphone', 'laptop', 'camera', 'selfie', 'karaoke'];
      const cLoan = cWords.filter(w => loanwords.some(l => w.includes(l)));
      if (cLoan.length === 0) return false;
      return dWords.some(w => cLoan.some(l => w.includes(l)));
    }

    function getDistractors(correct, field, count = 3, sessionTopic) {
      const correctVal = correct[field];
      const correctLen = correctVal.length;

      // Build candidate pool: prefer same-topic, then similar topics, then all
      let sameTopic = (PHRASES_BY_TOPIC[sessionTopic] || [])
        .filter(p => p.id !== correct.id && p[field] !== correctVal);
      let otherPhrases = ALL_PHRASES
        .filter(p => p.id !== correct.id && p[field] !== correctVal && p._topic !== sessionTopic);

      // Score candidates by similarity (same topic + similar length = better distractor)
      function score(p) {
        let s = 0;
        const pLen = p[field].length;
        const lenRatio = Math.min(correctLen, pLen) / Math.max(correctLen, pLen);
        s += lenRatio * 3; // length similarity (0-3)
        if (p._topic === sessionTopic) s += 5; // same topic bonus
        // Penalize if loanword overlap makes it too obvious (for english field)
        if (field === 'english' && hasLoanwordOverlap(correctVal, p[field])) s -= 10;
        return s;
      }

      const pool = [...sameTopic, ...otherPhrases];
      // Sort by score descending, then take top candidates and shuffle among them
      pool.sort((a, b) => score(b) - score(a));
      // Take top 8 candidates and shuffle to add randomness
      const topCandidates = pool.slice(0, Math.max(8, count * 2));
      return shuffle(topCandidates).slice(0, count).map(p => p[field]);
    }

    /* ── SceneBeat (Beat 1) ───────────────────────────────────────── */
    /* ── WarmupBeat (instant hook before scene) ──────────────────── */
    function WarmupBeat({ mastery, onComplete, onExit, onSettings, sessionTopic }) {
      // Pull 2 random previously-mastered phrases from any completed session
      const questions = useMemo(() => {
        const mastered = ALL_PHRASES.filter(p => mastery[p.id] && mastery[p.id].reps > 0);
        if (mastered.length < 2) return [];
        const picked = shuffle([...mastered]).slice(0, 2);
        return picked.map(p => {
          // Alternate between recognize (Korean→English) and recall (English→Korean)
          const step = Math.random() > 0.5 ? 'recognize' : 'recall';
          return { phrase: p, step };
        });
      }, []);

      const [idx, setIdx] = useState(0);
      const total = questions.length;

      if (total === 0) { onComplete(); return null; }

      const cur = questions[idx];
      if (!cur) { onComplete(); return null; }

      function handleNext() {
        if (idx + 1 >= total) {
          onComplete();
        } else {
          setIdx(idx + 1);
        }
      }

      return (
        <div className="app-container">

    /* ── KoreanPrompt (tappable Korean label with English hint) ──── */

    /* ── TappableKorean (generic tap-to-reveal for any Korean text) ── */
    function TappableKorean({ korean, english, className, style: customStyle }) {
      const [showHint, setShowHint] = useState(false);
      const timerRef = useRef(null);

    /* ── Fill-in-the-blank helpers ─────────────────────────────────── */
    function makeBlankExercise(phrase) {
      const words = phrase.korean.replace(/[.,!?]/g, '').split(/\s+/).filter(w => w.length > 0);
      if (words.length < 2) return null;
      // Pick a non-trivial word to blank out (skip very short particles)
      const candidates = words.filter(w => w.length >= 2);
      if (candidates.length === 0) return null;
      const blankedWord = candidates[Math.floor(Math.random() * candidates.length)];
      const blankedSentence = phrase.korean.replace(blankedWord, '______');
      // Generate distractors from other words in the session's phrases
      const allWords = ALL_PHRASES
        .flatMap(p => p.korean.replace(/[.,!?]/g, '').split(/\s+/))
        .filter(w => w.length >= 2 && w !== blankedWord);
      const uniqueWords = [...new Set(allWords)];
      // Prefer words of similar length
      uniqueWords.sort((a, b) => {
        const diffA = Math.abs(a.length - blankedWord.length);
        const diffB = Math.abs(b.length - blankedWord.length);
        return diffA - diffB;
      });
      const distractors = uniqueWords.slice(0, 12);
      const picked = shuffle(distractors).slice(0, 3);
      return { blankedSentence, blankedWord, distractors: picked };
    }

    /* ── PhraseExercise (single phrase, single step) ──────────────── */
    function PhraseExercise({ phrase, step, onNext, sessionTopic }) {
      const [revealed, setRevealed] = useState(false);

      // Auto-play TTS for listen exercises
      useEffect(() => {

            <div style={{ marginTop: 40 }}>

          </div>

      if (step === 'recognize') {
        const distractors = useMemo(() => getDistractors(phrase, 'english', 3, sessionTopic), [phrase.id]);

      }

      if (step === 'recall') {
        const distractors = useMemo(() => getDistractors(phrase, 'korean', 3, sessionTopic), [phrase.id]);
        const options = useMemo(() => shuffle([phrase.korean, ...distractors]), [phrase.id]);
        const correctIndex = options.indexOf(phrase.korean);
        return (
          <div className="fade-up" style={{ padding: '24px 0' }}>
            <KoreanPrompt korean="어떻게 말해요?" english="How do you say this?" />
            <p style={{ fontSize: 18, marginBottom: 28, lineHeight: 1.5 }}>{phrase.english}</p>
            <MultipleChoice
              options={options}
              correctIndex={correctIndex}
              onAnswer={correct => onNext(correct ? 5 : 2)}
              isKorean={true}
              koreanText={phrase.korean}
            />
          </div>
        );
      }

      if (step === 'fillin') {
        // Fill-in-the-blank: show Korean sentence with a word missing, pick the correct word
        const blankData = useMemo(() => makeBlankExercise(phrase), [phrase.id]);
        if (!blankData) {
          // Fallback to recall if sentence too short to blank
          const distractors = useMemo(() => getDistractors(phrase, 'korean', 3, sessionTopic), [phrase.id]);
          const options = useMemo(() => shuffle([phrase.korean, ...distractors]), [phrase.id]);
          const correctIndex = options.indexOf(phrase.korean);
          return (
            <div className="fade-up" style={{ padding: '24px 0' }}>
              <KoreanPrompt korean="어떻게 말해요?" english="How do you say this?" />
              <p style={{ fontSize: 18, marginBottom: 28, lineHeight: 1.5 }}>{phrase.english}</p>
              <MultipleChoice
                options={options}
                correctIndex={correctIndex}
                onAnswer={correct => onNext(correct ? 5 : 2)}
                isKorean={true}
                koreanText={phrase.korean}
              />
            </div>
          );
        }
        const options = useMemo(() => shuffle([blankData.blankedWord, ...blankData.distractors]), [phrase.id]);
        const correctIndex = options.indexOf(blankData.blankedWord);
        return (
          <div className="fade-up" style={{ padding: '24px 0' }}>
            <KoreanPrompt korean="빈칸을 채우세요" english="Fill in the blank" />
            <div style={{ marginBottom: 12 }}>
              <p className="korean-large" style={{ lineHeight: 1.6 }}>{blankData.blankedSentence}</p>
            </div>
            <p className="english-sub" style={{ marginBottom: 28 }}>{phrase.english}</p>
            <MultipleChoice
              options={options}
              correctIndex={correctIndex}
              onAnswer={correct => onNext(correct ? 5 : 2)}
              isKorean={true}
              koreanText={phrase.korean}
            />
          </div>
        );
      }

      if (step === 'listen') {
        const distractors = useMemo(() => getDistractors(phrase, 'english', 3, sessionTopic), [phrase.id]);
        const options = useMemo(() => shuffle([phrase.english, ...distractors]), [phrase.id]);
        const correctIndex = options.indexOf(phrase.english);
        return (
          <div className="fade-up" style={{ padding: '24px 0', textAlign: 'center' }}>
            <KoreanPrompt korean="들어 보세요" english="Listen carefully" />
            <div style={{ marginBottom: 28 }}>
              <button
                onClick={() => speakKorean(phrase.korean)}
                style={{
                  width: 72, height: 72, borderRadius: '50%', border: '2px solid var(--border)',
                  background: 'var(--surface)', cursor: 'pointer', display: 'inline-flex',
                  alignItems: 'center', justifyContent: 'center', transition: 'background 0.15s'
                }}
                onMouseOver={e => e.currentTarget.style.background = 'var(--surface-hover)'}
                onMouseOut={e => e.currentTarget.style.background = 'var(--surface)'}
                aria-label="Play audio again"
              >
                <svg viewBox="0 0 24 24" fill="var(--text)" style={{ width: 28, height: 28 }}>
                  <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
              </button>
            </div>
            <MultipleChoice
              options={options}
              correctIndex={correctIndex}
              onAnswer={correct => onNext(correct ? 5 : 1)}
              isKorean={false}
              koreanText={phrase.korean}
            />
          </div>
        );
      }

      if (step === 'context') {
        const distractors = useMemo(() => getDistractors(phrase, 'korean', 3, sessionTopic), [phrase.id]);
        const options = useMemo(() => shuffle([phrase.korean, ...distractors]), [phrase.id]);
        const correctIndex = options.indexOf(phrase.korean);
        return (
          <div className="fade-up" style={{ padding: '24px 0' }}>
            <KoreanPrompt korean="어떤 표현이에요?" english="Which phrase fits?" />
            <div style={{
              background: 'var(--surface)', borderRadius: 12, padding: '16px 20px',
              marginBottom: 28, lineHeight: 1.6, fontSize: 15, color: 'var(--text-secondary)',
              fontStyle: 'italic', borderLeft: '3px solid var(--accent-warm)'
            }}>
              {phrase.context || phrase.english}
            </div>
            <MultipleChoice
              options={options}
              correctIndex={correctIndex}
              onAnswer={correct => onNext(correct ? 5 : 2)}
              isKorean={true}
              koreanText={phrase.korean}
            />
          </div>
        );
      }

      return null;
    }

    /* ── PhraseBeat (Beat 2) — Micro-learning loops ──────────────── */
    /* Each phrase: see → recognize → recall/fillin (learn one, test one)
       Focus phrase gets extra: listen + context
       End: mixed review round with all phrases shuffled */
    function PhraseBeat({ session, onComplete, mastery, setMastery, onExit, onSettings }) {
      const phrases = session.phrases;
      const focusIdx = session.focusIndex || 0;
      const CHECKPOINT_INTERVAL = 8;

      const sequence = useMemo(() => {
        const seq = [];
        const focus = phrases[focusIdx];
        const others = phrases.filter((_, i) => i !== focusIdx);

        // ── Micro-loop: Focus phrase first (introduce → test immediately) ──
        seq.push({ phrase: focus, step: 'see' });
        seq.push({ phrase: focus, step: 'recognize' });
        seq.push({ phrase: focus, step: 'fillin' });

        // ── Micro-loops: Other phrases, 2 at a time ──
        // Pair them up so you learn 2, then get tested on those 2
        for (let i = 0; i < others.length; i += 2) {
          const chunk = others.slice(i, i + 2);
          // See both phrases in the chunk
          chunk.forEach(p => seq.push({ phrase: p, step: 'see' }));
          // Test each phrase once (alternate exercise types across chunks)
          const chunkExercises = [];
          chunk.forEach((p, j) => {
            const type = (i + j) % 2 === 0 ? 'recognize' : (Math.random() > 0.5 ? 'recall' : 'fillin');
            chunkExercises.push({ phrase: p, step: type });
          });
          shuffle(chunkExercises).forEach(e => seq.push(e));
        }

        // ── Focus phrase extra practice (harder exercises) ──
        seq.push({ phrase: focus, step: 'listen' });
        seq.push({ phrase: focus, step: 'context' });

        // ── Final mixed review: focus + 2 random others, diverse types ──
        const reviewTypes = ['recall', 'fillin', 'listen'];
        const reviewOthers = shuffle([...others]).slice(0, 2);
        const reviewPhrases = shuffle([focus, ...reviewOthers]);
        reviewPhrases.forEach((p, i) => {
          seq.push({ phrase: p, step: reviewTypes[i % reviewTypes.length] });
        });

        return seq;
      }, [session.id]);

      // Restore checkpoint if one exists for this session
      const checkpoint = useMemo(() => {
        const cp = load('sessionCheckpoint', null);
        return (cp && cp.sessionId === session.id) ? cp : null;
      }, []);

      const [idx, setIdx] = useState(checkpoint ? checkpoint.cardIndex : 0);
      const scoresRef = useRef(checkpoint ? checkpoint.scores : {});
      const [ttsHintDismissed, setTtsHintDismissed] = useState(false);
      const [showSaved, setShowSaved] = useState(false);
      const hasGeminiKey = !!load('geminiKey', '');

      const total = sequence.length;
      const progress = total > 0 ? ((idx + 1) / total) * 100 : 0;

      function handleNext(quality) {
        if (typeof quality === 'number') {
          const pid = sequence[idx].phrase.id;
          const prev = scoresRef.current[pid] || [];
          scoresRef.current[pid] = [...prev, quality];
        }

        if (idx + 1 >= total) {
          // Session complete — apply mastery, clear checkpoint
          const newMastery = { ...mastery };
          Object.entries(scoresRef.current).forEach(([pid, quals]) => {
            const avg = Math.round(quals.reduce((a, b) => a + b, 0) / quals.length);
            const existing = newMastery[pid] || { reps: 0, ef: 2.5, interval: 0 };
            newMastery[pid] = sm2(avg, existing);
          });
          setMastery(newMastery);
          save('sessionCheckpoint', null);
          onComplete();
        } else {
          const nextIdx = idx + 1;
          setIdx(nextIdx);
          // Save checkpoint every N cards
          if (nextIdx % CHECKPOINT_INTERVAL === 0) {
            save('sessionCheckpoint', {
              sessionId: session.id,
              cardIndex: nextIdx,
              scores: scoresRef.current,
            });
            setShowSaved(true);
            setTimeout(() => setShowSaved(false), 1500);
          }
        }
      }

      const cur = sequence[idx];
      if (!cur) return null;

      return (
        <div className="app-container">
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, paddingTop: 12 }}>
            <button className="btn-ghost" onClick={onExit} style={{ marginLeft: -12, padding: '8px' }} aria-label="Home"><HomeIcon /></button>
            {idx > 0 && <button className="btn-ghost" onClick={() => setIdx(idx - 1)} style={{ padding: '8px' }} aria-label="Previous"><BackIcon /></button>}
            <div style={{ flex: 1 }}>
              <div className="progress-track">
                <div className="progress-fill" style={{ width: progress + '%' }} />
              </div>
            </div>
            <button className="btn-ghost" onClick={onSettings} style={{ padding: '8px' }}><GearIcon /></button>
          </div>
          <p style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 4, textAlign: 'center' }}>
            {showSaved ? (
              <span style={{ color: 'var(--correct)', fontWeight: 500 }} className="fade-in">progress saved</span>
            ) : (
              <span>{idx + 1} / {total}</span>
            )}
          </p>
          {!hasGeminiKey && !ttsHintDismissed && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'var(--surface)', borderRadius: 8, marginTop: 4, fontSize: 13, color: 'var(--text-secondary)' }}>
              <span style={{ flex: 1 }}>Add a Gemini key for natural audio</span>
              <button className="btn-ghost" onClick={onSettings} style={{ fontSize: 12, padding: '4px 8px', color: 'var(--accent-warm)' }}>Settings</button>
              <button className="btn-ghost" onClick={() => setTtsHintDismissed(true)} style={{ fontSize: 16, padding: '2px 6px', lineHeight: 1 }}>&times;</button>
            </div>
          )}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            <PhraseExercise
              key={cur.phrase.id + '-' + cur.step + '-' + idx}
              phrase={cur.phrase}
              step={cur.step}
              onNext={handleNext}
              sessionTopic={session.topic}
            />
          </div>
        </div>
      );
    }

    /* ── DialogueBeat (between Phrases and Takeaway) ─────────────── */
    // Natural response lines from the other speaker, per topic
    const TOPIC_DIALOGUE_RESPONSES = {
      cafe: { korean: '네, 잠시만요.', english: 'Yes, one moment.' },
      convenience: { korean: '네, 여기 있어요.', english: 'Yes, here it is.' },
      restaurant: { korean: '네, 알겠습니다.', english: 'Yes, understood.' },
      transit: { korean: '네, 맞아요.', english: 'Yes, that\'s right.' },
      shopping: { korean: '네, 그럼요.', english: 'Yes, of course.' },
      daily: { korean: '아, 그래요?', english: 'Oh, really?' },
      movies: { korean: '맞아요, 저도요.', english: 'Right, me too.' },
      music: { korean: '오, 진짜요?', english: 'Oh, really?' },
      feelings: { korean: '그렇구나.', english: 'I see.' },
      weather: { korean: '그러게요.', english: 'I know, right.' },
      work: { korean: '네, 확인할게요.', english: 'Yes, I\'ll check.' },
      opinions: { korean: '그렇게 생각해요?', english: 'You think so?' },
      kdrama: { korean: '맞아, 맞아.', english: 'Right, right.' },
      'food-culture': { korean: '맛있죠?', english: 'It\'s good, right?' },
      philosophy: { korean: '흥미롭네요.', english: 'That\'s interesting.' },
      health: { korean: '맞아요, 중요해요.', english: 'Right, it\'s important.' },
      climbing: { korean: '조심하세요.', english: 'Be careful.' },
      travel: { korean: '네, 이쪽이에요.', english: 'Yes, this way.' },
      books: { korean: '오, 좋은 책이에요.', english: 'Oh, that\'s a good book.' },
      texting: { korean: 'ㅋㅋ 그러게.', english: 'Lol, right.' }
    };

    function DialogueBeat({ session, onContinue, onExit, onSettings }) {
      const phrases = session.phrases;
      const lines = useMemo(() => {
        // A-B-A pattern: user says learned phrases, other speaker responds naturally
        const focusIdx = session.focusIndex || 0;
        const focus = phrases[focusIdx];
        const others = phrases.filter((_, i) => i !== focusIdx);
        const response = focus.response || TOPIC_DIALOGUE_RESPONSES[session.topic] || { korean: '네.', english: 'Yes.' };
        const picked = [];
        picked.push({ speaker: 'A', phrase: focus });
        picked.push({ speaker: 'B', phrase: response });
        if (others[0]) picked.push({ speaker: 'A', phrase: others[0] });
        return picked;
      }, [session.id]);

      const [visibleCount, setVisibleCount] = useState(0);
      const [showTranslation, setShowTranslation] = useState(false);
      const playingRef = useRef(false);

      // Auto-play lines one by one with delays
      useEffect(() => {
        if (playingRef.current) return;
        playingRef.current = true;
        let cancelled = false;
        async function playLines() {
          for (let i = 0; i < lines.length; i++) {
            if (cancelled) return;
            setVisibleCount(i + 1);
            try {
              await speakKorean(lines[i].phrase.korean);
            } catch (e) { /* continue on TTS failure */ }
            // Short pause between lines
            if (i < lines.length - 1) {
              await new Promise(r => setTimeout(r, 600));
            }
          }
        }
        playLines();
        return () => { cancelled = true; };
      }, []);

      const speakerA = '나';  // "me"
      const speakerB = session.topicKorean === '카페' ? '바리스타' :
                        session.topic === 'restaurant' ? '직원' :
                        session.topic === 'convenience' ? '직원' :
                        session.topic === 'transit' ? '기사님' :
                        session.topic === 'shopping' ? '직원' :
                        '상대방';  // "the other person"

      return (
        <div className="app-container" style={{ paddingTop: 0, paddingBottom: 40 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, paddingTop: 12 }}>
            <button className="btn-ghost" onClick={onExit} style={{ marginLeft: -12, padding: '8px' }} aria-label="Home"><HomeIcon /></button>
            <div style={{ flex: 1 }} />
            <button className="btn-ghost" onClick={onSettings} style={{ padding: '8px' }}><GearIcon /></button>
          </div>

          <div className="fade-up" style={{ textAlign: 'center', marginBottom: 24, marginTop: 24 }}>
            <p className="serif" style={{ fontSize: 14, color: 'var(--text-tertiary)', fontStyle: 'italic', marginBottom: 4 }}>
              잠깐 대화 <span style={{ opacity: 0.5, fontSize: 12 }}>mini dialogue</span>
            </p>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {lines.map((line, i) => {
              if (i >= visibleCount) return null;
              const isMe = line.speaker === 'A';
              const name = isMe ? speakerA : speakerB;
              return (
                <div key={i} className="fade-up" style={{
                  display: 'flex', flexDirection: 'column',
                  alignItems: isMe ? 'flex-end' : 'flex-start'
                }}>
                  <span style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 3, paddingLeft: isMe ? 0 : 4, paddingRight: isMe ? 4 : 0 }}>
                    {name}
                  </span>
                  <div style={{
                    background: isMe ? 'var(--accent-warm)' : 'var(--surface)',
                    color: isMe ? '#fff' : 'var(--text)',
                    borderRadius: 16,
                    borderTopRightRadius: isMe ? 4 : 16,
                    borderTopLeftRadius: isMe ? 16 : 4,
                    padding: '12px 16px',

    /* ── TakeawayBeat (Beat 3) ────────────────────────────────────── */

    /* ── SessionView ──────────────────────────────────────────────── */
    function SessionView({ sessionId, onFinish, onMore, mastery, setMastery, onSettings, onExit }) {
      // Skip warmup/scene if resuming from a checkpoint
      const hasCheckpoint = useMemo(() => {
        const cp = load('sessionCheckpoint', null);
        return cp && cp.sessionId === sessionId && cp.cardIndex > 0;
      }, []);
      const hasMasteryData = Object.values(mastery).some(m => m.reps > 0);
      const [beat, setBeat] = useState(
        hasCheckpoint ? 'phrases' : (hasMasteryData ? 'warmup' : 'scene')
      );
      const sessions = window.SESSIONS || [];
      const rawSession = sessions.find(s => s.id === sessionId);
      const session = rawSession ? resolveSession(rawSession) : null;

      useEffect(() => {
        if (session) prefetchSessionAudio(session);
      }, [sessionId]);

      if (!session) {
        const hasAnthropicKey = !!load('apiKey', '');
        return (
          <div className="app-container" style={{ justifyContent: 'center', alignItems: 'center' }}>
            <div className="empty-state" style={{ padding: '40px 20px' }}>
              <div className="empty-state-icon">🎉</div>
              <p className="serif" style={{ fontSize: 22, color: 'var(--text)', fontStyle: 'italic', letterSpacing: '-0.02em', marginBottom: 8 }}>
                All 60 sessions complete!
              </p>
              <p style={{ fontSize: 15, color: 'var(--text-secondary)', lineHeight: 1.6, marginBottom: 24 }}>
                You've learned ~300 Korean phrases. That's incredible.
              </p>
              {!hasAnthropicKey ? (
                <div style={{ background: 'var(--surface)', borderRadius: 14, padding: '20px 18px', marginBottom: 24, textAlign: 'left' }}>
                  <p style={{ fontSize: 14, fontWeight: 500, color: 'var(--text)', marginBottom: 6 }}>
                    Want more sessions?
                  </p>
                  <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, marginBottom: 14 }}>
                    Add an Anthropic API key in Settings and the app can generate new personalized sessions for you with Claude.
                  </p>
                  <button className="btn-primary" onClick={onSettings} style={{ fontSize: 14, padding: '12px 18px' }}>
                    Go to Settings
                  </button>
                </div>
              ) : (
                <div style={{ background: 'var(--surface)', borderRadius: 14, padding: '20px 18px', marginBottom: 24, textAlign: 'left' }}>
                  <p style={{ fontSize: 14, fontWeight: 500, color: 'var(--text)', marginBottom: 6 }}>
                    Generate new sessions
                  </p>
                  <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
                    Your Anthropic key is set. New AI-generated sessions are coming soon!
                  </p>
                </div>
              )}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10, width: '100%', maxWidth: 260 }}>
                <button className="btn-secondary" onClick={onFinish}>
                  Back to home
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (beat === 'warmup') {
        return (
          <WarmupBeat
            mastery={mastery}
            onComplete={() => setBeat('scene')}
            onExit={onExit}
            onSettings={onSettings}
            sessionTopic={session.topic}
          />
        );
      }
      if (beat === 'scene') return <SceneBeat session={session} onContinue={() => setBeat('phrases')} onExit={onExit} onSettings={onSettings} />;
      if (beat === 'phrases') {
        return (
          <PhraseBeat
            key={sessionId}
            session={session}
            mastery={mastery}
            setMastery={setMastery}
            onComplete={() => setBeat('dialogue')}
            onExit={onExit}
            onSettings={onSettings}
          />
        );
      }
      if (beat === 'dialogue') {
        return <DialogueBeat session={session} onContinue={() => setBeat('takeaway')} onExit={onExit} onSettings={onSettings} />;
      }
      if (beat === 'takeaway') {
        return <TakeawayBeat session={session} onMore={onMore} onCollection={onFinish} onExit={onExit} onSettings={onSettings} />;
      }
      return null;
    }
