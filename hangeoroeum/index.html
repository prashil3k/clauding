    /* ── SettingsView ─────────────────────────────────────────────── */
    function SettingsView({ onBack }) {
      const [geminiKey, setGeminiKey] = useStorage('geminiKey', '');
      const [ttsModel, setTtsModel] = useStorage('ttsModel', DEFAULT_TTS_MODEL);
      const [ttsVoice, setTtsVoice] = useStorage('ttsVoice', DEFAULT_VOICE);
      const [anthropicKey, setAnthropicKey] = useStorage('apiKey', '');
      const [availableModels, setAvailableModels] = useStorage('ttsModels', KNOWN_TTS_MODELS);
      const [aboutYou, setAboutYou] = useStorage('aboutYou', '');

      const [geminiInput, setGeminiInput] = useState(geminiKey);
      const [anthropicInput, setAnthropicInput] = useState(anthropicKey);
      const [aboutInput, setAboutInput] = useState(aboutYou);
      const [saved, setSaved] = useState(null); // 'gemini' | 'gemini-error' | 'anthropic' | 'about' | null
      const [detecting, setDetecting] = useState(false);
      const [detectMsg, setDetectMsg] = useState('');
      const [testPlaying, setTestPlaying] = useState(false);
      const [geminiStatus, setGeminiStatus] = useState(''); // 'validating' | 'valid' | error message

      async function saveGemini() {
        const key = geminiInput.trim();
        if (!key) {
          setGeminiKey('');
          setSaved('gemini');
          setGeminiStatus('');
          setTimeout(() => setSaved(null), 2000);
          return;
        }
        setGeminiStatus('validating');
        // Validate by trying to list models
        try {
          const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
          if (!resp.ok) {
            const err = await resp.text().catch(() => '');
            if (resp.status === 400 || resp.status === 403) {
              setGeminiStatus('Invalid API key');
              setSaved('gemini-error');
              setTimeout(() => setSaved(null), 4000);
              return;
            }
            throw new Error(`API ${resp.status}`);
          }
          const data = await resp.json();
          const models = (data.models || [])
            .map(m => m.name.replace('models/', ''))
            .filter(n => n.includes('tts'));
          if (models.length > 0) {
            const known = KNOWN_TTS_MODELS.filter(m => models.includes(m));
            const extra = models.filter(m => !KNOWN_TTS_MODELS.includes(m));
            const allModels = [...known, ...extra];
            setAvailableModels(allModels);
            if (!allModels.includes(ttsModel)) setTtsModel(allModels[0]);
            setGeminiStatus(`Key valid — ${allModels.length} TTS model${allModels.length > 1 ? 's' : ''} found`);
          } else {
            setGeminiStatus('Key valid — no TTS models found (check API access)');
          }
          setGeminiKey(key);
          setSaved('gemini');
          setTimeout(() => setSaved(null), 2000);
          setTimeout(() => setGeminiStatus(''), 6000);
        } catch (e) {
          setGeminiStatus('Could not validate key — saved anyway');
          setGeminiKey(key);
          setSaved('gemini');
          setTimeout(() => { setSaved(null); setGeminiStatus(''); }, 4000);
        }
      }

      function saveAnthropic() {
        setAnthropicKey(anthropicInput.trim());
        setSaved('anthropic');
        setTimeout(() => setSaved(null), 2000);
      }

      function saveAboutYou() {
        const text = aboutInput.trim();
        setAboutYou(text);
        setSaved('about');
        setTimeout(() => setSaved(null), 2000);
        // Trigger AI interest mapping in background (non-blocking)
        refreshInterestMap(text);
      }

      async function handleDetect() {
        const key = geminiInput.trim() || geminiKey;
        if (!key) { setDetectMsg('Enter API key first'); return; }
        setDetecting(true);
        setDetectMsg('Detecting...');
        try {
          const models = await detectGeminiModels(key);
          if (models.length > 0) {
            setAvailableModels(models);
            if (!models.includes(ttsModel)) setTtsModel(models[0]);
            setDetectMsg(`Found ${models.length} TTS model${models.length > 1 ? 's' : ''}`);
          } else {
            setDetectMsg('No TTS models found');
          }
        } catch (e) {
          setDetectMsg('Detection failed — check key');
        }
        setDetecting(false);
        setTimeout(() => setDetectMsg(''), 4000);
      }

      const [ttsTestResult, setTtsTestResult] = useState('');
      const [personalizing, setPersonalizing] = useState(false);
      const [personalizeProgress, setPersonalizeProgress] = useState('');
      const nonAnchorCount = useMemo(() => getNonAnchorIds().length, []);
      const personalizedCount = useMemo(() => {
        return getNonAnchorIds().filter(id => getPersonalizedSession(id)).length;
      }, [personalizing]); // re-count when personalizing finishes

      async function handlePersonalize() {
        const key = geminiKey || geminiInput.trim();
        if (!key) { setPersonalizeProgress('Add a Gemini API key first'); setTimeout(() => setPersonalizeProgress(''), 3000); return; }
        const about = aboutYou || aboutInput.trim();
        if (!about) { setPersonalizeProgress('Write something in "About You" first'); setTimeout(() => setPersonalizeProgress(''), 3000); return; }

        // Get top interest from interest map
        const interestMap = buildInterestMap(about);
        const topInterest = interestMap
          ? Object.entries(interestMap).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([t]) => t).join(', ')
          : about.slice(0, 200);

        const ids = getNonAnchorIds();
        if (ids.length === 0) { setPersonalizeProgress('No sessions to personalize'); return; }

        setPersonalizing(true);
        setPersonalizeProgress(`Generating... 0 / ${ids.length}`);

        try {
          await personalizeSessionBatch(ids, topInterest, (done, total) => {
            setPersonalizeProgress(`Generating... ${done} / ${total}`);
          });
          const count = ids.filter(id => getPersonalizedSession(id)).length;
          setPersonalizeProgress(`Done — ${count} sessions personalized`);
          setTimeout(() => setPersonalizeProgress(''), 5000);
        } catch (e) {
          setPersonalizeProgress('Failed: ' + e.message);
          setTimeout(() => setPersonalizeProgress(''), 5000);
        }
        setPersonalizing(false);
      }

      function handleClearPersonalization() {
        if (!confirm('Remove all personalized content? Sessions will revert to defaults.')) return;
        clearPersonalizedSessions();
        setPersonalizeProgress('Cleared — using default sessions');
        setTimeout(() => setPersonalizeProgress(''), 3000);
      }

      async function testVoice() {
        setTestPlaying(true);
        setTtsTestResult('');
        try {
          await speakKorean('안녕하세요');
          if (lastTtsSource === 'gemini') setTtsTestResult('Gemini TTS working');
          else if (lastTtsSource === 'gemini-fallback') setTtsTestResult('Playing via fallback model');
          else if (lastTtsSource === 'web-speech') setTtsTestResult('Fell back to basic TTS — check API key & model');
          else setTtsTestResult('No audio played');
        } catch {
          setTtsTestResult('Audio playback failed');
        }
        setTestPlaying(false);
        setTimeout(() => setTtsTestResult(''), 5000);
      }

      const DATA_KEYS = ['completedSessions', 'mastery', 'streak', 'lastSessionDate',
        'apiKey', 'geminiKey', 'ttsModel', 'ttsVoice', 'ttsModels', 'welcomed', 'aboutYou',
        'aiInterestMap', 'aiInterestMapText',
        ...getNonAnchorIds().map(id => `personalized_${id}`)];

      function handleExport() {
        const data = {};
        DATA_KEYS.forEach(k => {
          const v = localStorage.getItem('hgr_' + k);
          if (v !== null) data[k] = JSON.parse(v);
        });
        data._exported = new Date().toISOString();
        data._version = 1;
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `hangeoroeum-backup-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      const fileInputRef = useRef(null);
      const [importMsg, setImportMsg] = useState('');

      function handleImport(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data.completedSessions && !data.mastery) {
              setImportMsg('Invalid backup file');
              setTimeout(() => setImportMsg(''), 3000);
              return;
            }
            if (!confirm('This will replace your current progress with the imported data. Continue?')) return;
            DATA_KEYS.forEach(k => {
              if (data[k] !== undefined) {
                localStorage.setItem('hgr_' + k, JSON.stringify(data[k]));
              }
            });
            setImportMsg('Imported! Reloading...');
            setTimeout(() => window.location.reload(), 800);
          } catch {
            setImportMsg('Could not read file');
            setTimeout(() => setImportMsg(''), 3000);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      }

      function handleReset() {
        if (confirm('This will erase all your progress and collection. Are you sure?')) {
          DATA_KEYS.forEach(k => localStorage.removeItem('hgr_' + k));
          window.location.reload();
        }
      }

      return (
        <div className="app-container">
          <div className="top-bar">
            <button className="btn-ghost" onClick={onBack} style={{ marginLeft: -12 }}>
              <BackIcon />
            </button>
            <span className="top-bar-title serif" style={{ fontSize: 22, fontStyle: 'italic' }}>Settings</span>
            <div style={{ width: 44 }} />
          </div>
          <div className="scroll-area">

            {/* Gemini TTS Section */}
            <div className="settings-section">
              <label className="settings-label">Gemini API Key</label>
              <p className="settings-hint">
                Free tier available. Powers natural Korean text-to-speech.
              </p>
              <input
                className="settings-input"
                type="password"
                placeholder="AIza..."
                value={geminiInput}
                onChange={e => setGeminiInput(e.target.value)}
              />
              <div className="settings-row">
                <button
                  className="btn-primary"
                  onClick={saveGemini}
                  disabled={geminiStatus === 'validating'}
                  style={{
                    flex: 1, padding: '12px 16px', fontSize: 14,
                    background: saved === 'gemini' ? 'var(--correct)' : saved === 'gemini-error' ? 'var(--incorrect)' : undefined,
                    opacity: geminiStatus === 'validating' ? 0.7 : 1
                  }}
                >
                  {geminiStatus === 'validating' ? 'Validating...' : saved === 'gemini' ? 'Saved' : saved === 'gemini-error' ? 'Invalid Key' : 'Save Key'}
                </button>
              </div>
              {geminiStatus && geminiStatus !== 'validating' && (
                <p className="detect-status" style={{
                  marginTop: 6,
                  color: geminiStatus.includes('valid') || geminiStatus.includes('found')
                    ? 'var(--correct)' : 'var(--incorrect)'
                }}>
                  {geminiStatus}
                </p>
              )}
            </div>

            {/* TTS Model */}
            <div className="settings-section">
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                <label className="settings-label" style={{ marginBottom: 0 }}>TTS Model</label>
                <button className="btn-detect" onClick={handleDetect} disabled={detecting}>
                  🔍 {detecting ? 'Detecting...' : 'Detect'}
                </button>
              </div>
              {detectMsg && (
                <p className="detect-status" style={{ color: detectMsg.includes('Found') ? 'var(--correct)' : 'var(--text-tertiary)' }}>
                  {detectMsg}
                </p>
              )}
              <select
                className="settings-select"
                value={ttsModel}
                onChange={e => setTtsModel(e.target.value)}
              >
                {availableModels.map(m => (
                  <option key={m} value={m}>{m}</option>
                ))}
              </select>
            </div>

            {/* TTS Voice */}
            <div className="settings-section">
              <label className="settings-label">Voice</label>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <select
                  className="settings-select"
                  value={ttsVoice}
                  onChange={e => setTtsVoice(e.target.value)}
                  style={{ flex: 1 }}
                >
                  {TTS_VOICES.map(v => (
                    <option key={v.id} value={v.id}>{v.label} — {v.desc}</option>
                  ))}
                </select>
                <button
                  className="btn-detect"
                  onClick={testVoice}
                  disabled={testPlaying}
                  style={{ whiteSpace: 'nowrap' }}
                >
                  {testPlaying ? '...' : '▶ Test'}
                </button>
              </div>
              {ttsTestResult && (
                <p className="detect-status" style={{
                  marginTop: 6,
                  color: ttsTestResult.includes('working') ? 'var(--correct)' : 'var(--incorrect)'
                }}>
                  {ttsTestResult}
                </p>
              )}
            </div>

            <div className="divider" style={{ margin: '8px 0 24px' }} />

            {/* Anthropic API Key */}
            <div className="settings-section">
              <label className="settings-label">Anthropic API Key</label>
              <p className="settings-hint">
                Optional. For AI-generated sessions beyond the 60 pre-loaded ones.
              </p>
              <input
                className="settings-input"
                type="password"
                placeholder="sk-ant-..."
                value={anthropicInput}
                onChange={e => setAnthropicInput(e.target.value)}
              />
              <button
                className="btn-primary"
                onClick={saveAnthropic}
                style={{ marginTop: 8, padding: '12px 16px', fontSize: 14, background: saved === 'anthropic' ? 'var(--correct)' : undefined }}
              >
                {saved === 'anthropic' ? 'Saved' : 'Save Key'}
              </button>
            </div>

            <div className="divider" style={{ margin: '8px 0 24px' }} />

            {/* About You */}
            <div className="settings-section">
              <label className="settings-label">About You</label>
              <p className="settings-hint">
                Tell the app about yourself so it can prioritize lessons that match your life. This stays on your device.
              </p>
              <textarea
                className="settings-input"
                value={aboutInput}
                onChange={e => setAboutInput(e.target.value)}
                rows={5}
                placeholder={"e.g. I work in marketing at a tech startup. I love rock climbing, K-dramas, and Korean movies. I'm into philosophy — Stoicism, Jung, Buddhism. I read a lot. I've been to Seoul twice and want to move there someday. I listen to Korean indie music, not just K-pop. I'm learning Korean to actually talk to people, not just pass tests..."}
                style={{
                  resize: 'vertical', minHeight: 100, lineHeight: 1.6, fontFamily: "'DM Sans', sans-serif",
                  fontSize: 14, padding: '12px 14px'
                }}
              />
              <button
                className="btn-primary"
                onClick={saveAboutYou}
                style={{ marginTop: 8, padding: '12px 16px', fontSize: 14, background: saved === 'about' ? 'var(--correct)' : undefined }}
              >
                {saved === 'about' ? 'Saved — lessons will adapt' : 'Save'}
              </button>
              {aboutYou && !saved && (
                <p style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 6, fontStyle: 'italic' }}>
                  Your interests shape which topics come first.
                </p>
              )}
            </div>

            {/* AI Content Personalization */}
            {aboutYou && geminiKey && (
              <div className="settings-section" style={{ marginTop: 16 }}>
                <label className="settings-label">Personalized Lessons</label>
                <p className="settings-hint">
                  Re-theme {nonAnchorCount} non-anchor sessions around your interests using AI. Anchor sessions (café ordering, transit, etc.) stay as-is.
                  {personalizedCount > 0 && ` Currently: ${personalizedCount} / ${nonAnchorCount} personalized.`}
                </p>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button
                    className="btn-primary"
                    onClick={handlePersonalize}
                    disabled={personalizing}
                    style={{ flex: 1, padding: '12px 16px', fontSize: 14, opacity: personalizing ? 0.6 : 1 }}
                  >
                    {personalizing ? 'Generating...' : personalizedCount > 0 ? 'Regenerate' : 'Personalize My Lessons'}
                  </button>
                  {personalizedCount > 0 && !personalizing && (
                    <button
                      className="btn-secondary"
                      onClick={handleClearPersonalization}
                      style={{ padding: '12px 16px', fontSize: 14 }}
                    >
                      Clear
                    </button>
                  )}
                </div>
                {personalizeProgress && (
                  <p style={{
                    fontSize: 12, marginTop: 8, fontStyle: 'italic',
                    color: personalizeProgress.startsWith('Done') ? 'var(--correct)' :
                           personalizeProgress.startsWith('Failed') ? 'var(--incorrect)' : 'var(--text-secondary)'
                  }}>
                    {personalizeProgress}
                  </p>
                )}
              </div>
            )}

            <div className="divider" style={{ margin: '8px 0 24px' }} />

            {/* Export / Import */}
            <div className="settings-section">
              <label className="settings-label">Backup & Restore</label>
              <p className="settings-hint">
                Export your progress to a JSON file, or import a previous backup. Includes mastery data, completed sessions, streak, and settings.
              </p>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn-secondary" onClick={handleExport} style={{ flex: 1, padding: '12px 16px', fontSize: 14 }}>
                  Export
                </button>
                <button className="btn-secondary" onClick={() => fileInputRef.current?.click()} style={{ flex: 1, padding: '12px 16px', fontSize: 14 }}>
                  Import
                </button>
                <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} style={{ display: 'none' }} />
              </div>
              {importMsg && (
                <p className="detect-status" style={{ marginTop: 8, color: importMsg.includes('Imported') ? 'var(--correct)' : 'var(--incorrect)' }}>
                  {importMsg}
                </p>
              )}
            </div>

            <div className="divider" style={{ margin: '8px 0 24px' }} />

            {/* Reset */}
            <div className="settings-section">
              <label className="settings-label">Reset Progress</label>
              <p className="settings-hint">
                Erase all progress, mastery data, and collection. Cannot be undone.
              </p>
              <button
                className="btn-secondary"
                onClick={handleReset}
                style={{ color: 'var(--incorrect)', borderColor: 'var(--incorrect)' }}
              >
                Reset Everything
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── HomeScreen ───────────────────────────────────────────────── */
    function HomeScreen({ completedSessions, mastery, streak, onStartSession, onCollection, onSettings, onLessonPlan }) {
      const sessions = window.SESSIONS || [];
      const totalPhrases = completedSessions.reduce((acc, sid) => {
        const s = sessions.find(x => x.id === sid);
        return acc + (s ? s.phrases.length : 0);
      }, 0);

      const aboutYou = load('aboutYou', '');
      const interestMap = buildInterestMap(aboutYou);
      const orderedRemaining = getOrderedSessions(completedSessions, interestMap);
      const nextSession = orderedRemaining.length > 0 ? orderedRemaining[0] : null;
      const allDone = !nextSession;

      const recentPhrases = useMemo(() => {
        return [...completedSessions].reverse().slice(0, 3).map(sid => {
          const raw = sessions.find(x => x.id === sid);
          const s = raw ? resolveSession(raw) : null;
          return s ? s.phrases[s.focusIndex || 0] : null;
        }).filter(Boolean);
      }, [completedSessions]);

      // Chapter info for next session
      const nextResolved = nextSession ? resolveSession(nextSession) : null;
      const chapterInfo = useMemo(() => {
        if (!nextResolved) return null;
        const topicSessions = sessions.filter(s => s.topic === nextResolved.topic);
        const posInTopic = topicSessions.findIndex(s => s.id === nextResolved.id) + 1;
        const total = topicSessions.length;
        const skeletons = window.GRAMMAR_SKELETONS || {};
        const sk = skeletons[nextResolved.id];
        const grammarPreview = sk ? sk.grammar[0] : null;
        return { posInTopic, total, grammarPreview };
      }, [nextSession]);

      // Peek at upcoming 2-3 sessions after the next one
      const upcomingSessions = useMemo(() => {
        return orderedRemaining.slice(1, 4).map(s => {
          const resolved = resolveSession(s);
          const sk = (window.GRAMMAR_SKELETONS || {})[s.id];
          return { ...resolved, grammarPreview: sk ? sk.grammar[0] : null };
        });
      }, [orderedRemaining]);

      return (
        <div className="app-container">
          <div className="top-bar">
            <span className="serif" style={{ fontSize: 26, letterSpacing: '-0.02em' }}>한걸음</span>
            <button className="btn-ghost" onClick={onSettings}><GearIcon /></button>
          </div>
          <div className="scroll-area">
            {completedSessions.length > 0 && (
              <div className="fade-in">
                <div className="stats-row" style={{ justifyContent: 'flex-start' }}>
                  <div className="stat-item">
                    <div className="stat-value">{totalPhrases}</div>
                    <div className="stat-label">phrases</div>
                  </div>
                  <div className="stat-item">
                    <div className="stat-value">{completedSessions.length}</div>
                    <div className="stat-label">sessions</div>
                  </div>
                  {streak > 0 && (
                    <div className="stat-item">
                      <div className="stat-value">{streak}</div>
                      <div className="stat-label">day streak</div>
                    </div>
                  )}
                </div>
                <div className="divider" />
              </div>
            )}

            <div style={{ padding: '24px 0 32px' }} className="fade-up">
              {!allDone && nextResolved && chapterInfo && (
                <div style={{ marginBottom: 12 }}>
                  <p style={{ fontSize: 14, color: 'var(--text)', fontFamily: "'DM Sans', sans-serif", fontWeight: 500 }}>
                    <span className="korean">{nextResolved.topicKorean}</span>
                    <span style={{ color: 'var(--text-tertiary)', marginLeft: 6, fontSize: 12 }}>
                      {TOPIC_ENGLISH[nextResolved.topic] || nextResolved.topic}
                    </span>
                    {chapterInfo.total > 1 && (
                      <span style={{ color: 'var(--text-tertiary)', marginLeft: 8, fontSize: 12 }}>
                        · {chapterInfo.posInTopic} of {chapterInfo.total}
                      </span>
                    )}
                  </p>
                  {chapterInfo.grammarPreview && (
                    <p style={{ fontSize: 12, color: 'var(--accent-warm)', marginTop: 4, fontFamily: "'DM Sans', sans-serif", fontStyle: 'italic' }}>
                      {chapterInfo.grammarPreview}
                    </p>
                  )}
                </div>
              )}
              <button className="btn-primary" onClick={onStartSession} style={{ fontSize: 18, padding: '18px 24px' }}>
                {allDone ? '복습하기' : '다음 한걸음'}
                <span style={{ display: 'block', fontSize: 11, opacity: 0.5, fontWeight: 400, marginTop: 2 }}>{allDone ? 'Review' : 'Next step'}</span>
              </button>
              {completedSessions.length === 0 && (
                <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginTop: 12, textAlign: 'center', fontFamily: "'DM Sans', sans-serif", fontStyle: 'italic' }}>
                  ~2 minutes per session
                </p>
              )}
              <button className="btn-ghost" onClick={onLessonPlan} style={{ marginTop: 12, width: '100%', textAlign: 'center', fontSize: 13, color: 'var(--text-tertiary)' }}>
                수업 목록 <span style={{ opacity: 0.5, fontSize: 11 }}>Lesson plan</span>
              </button>
            </div>

            {/* Upcoming peek */}
            {upcomingSessions.length > 0 && !allDone && (
              <div className="fade-up-delay" style={{ marginBottom: 16 }}>
                <p style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-tertiary)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>COMING UP</p>
                {upcomingSessions.map(s => (
                  <div key={s.id} style={{ padding: '6px 0', display: 'flex', alignItems: 'baseline', gap: 8 }}>
                    <span className="korean" style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{s.topicKorean}</span>
                    {s.grammarPreview && (
                      <span style={{ fontSize: 11, color: 'var(--text-tertiary)', fontStyle: 'italic' }}>{s.grammarPreview}</span>
                    )}
                  </div>
                ))}
                <div className="divider" style={{ marginTop: 8 }} />
              </div>
            )}

            {recentPhrases.length > 0 && (
              <div className="fade-up-delay">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <p style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-tertiary)', letterSpacing: '0.03em' }}>RECENT</p>
                  <button className="btn-ghost" onClick={onCollection} style={{ fontSize: 13 }}>See all</button>
                </div>
                {recentPhrases.map(p => (
                  <div key={p.id} style={{ padding: '10px 0', display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div className="mastery-dot" style={{ background: getMasteryColor(mastery[p.id]) }} />
                    <div style={{ flex: 1 }}>
                      <span className="korean" style={{ fontSize: 17, fontWeight: 500 }}>{p.korean}</span>
                      <span style={{ fontSize: 14, color: 'var(--text-tertiary)', marginLeft: 10 }}>{p.english}</span>
                    </div>
                    <SpeakerButton text={p.korean} />
                  </div>
                ))}
              </div>
            )}

            {completedSessions.length === 0 && (
              <div className="fade-up-delay" style={{ textAlign: 'center', padding: '40px 20px' }}>
                <p className="serif" style={{ fontSize: 22, color: 'var(--text-secondary)', lineHeight: 1.6, fontStyle: 'italic', letterSpacing: '-0.02em' }}>
                  One phrase at a time.<br />One step at a time.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── WelcomeModal ────────────────────────────────────────────── */

      const [step, setStep] = useState(0);
      const [geminiInput, setGeminiInput] = useState('');
      const [anthropicInput, setAnthropicInput] = useState('');
      const totalSteps = 3;

      function finish() {
        if (geminiInput.trim()) save('geminiKey', geminiInput.trim());
        if (anthropicInput.trim()) save('apiKey', anthropicInput.trim());
        save('welcomed', true);
        onComplete();
      }

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && step === 0 ? null : null}>
          <div className="modal-card">
            <div className="welcome-step-dots">
              {[0, 1, 2].map(i => (
                <div key={i} className={'welcome-dot' + (i <= step ? ' active' : '')} />
              ))}
            </div>

            {step === 0 && (
              <div className="fade-up" style={{ textAlign: 'center' }}>
                <img src="writing.png" alt="한걸음" className="welcome-icon" />
                <h1 className="serif" style={{ fontSize: 34, letterSpacing: '-0.02em', marginBottom: 4 }}>한걸음</h1>
                <p style={{ fontSize: 14, color: 'var(--text-tertiary)', marginBottom: 20, fontFamily: "'DM Sans', sans-serif", fontStyle: 'italic' }}>
                  Hangeoroeum
                </p>
                <p className="serif" style={{ fontSize: 18, color: 'var(--text-secondary)', lineHeight: 1.7, fontStyle: 'italic', marginBottom: 8 }}>
                  Learn Korean, one phrase at a time.
                </p>
                <p style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.7, marginTop: 16 }}>
                  Each session drops you into a real scene — a cafe, a subway, a late-night market — and teaches you the phrases that matter. Spaced repetition does the rest.
                </p>
                <p style={{ fontSize: 13, color: 'var(--text-tertiary)', lineHeight: 1.6, marginTop: 12 }}>
                  60 sessions. ~300 phrases. 2 minutes each.
                </p>
                <button className="btn-primary" onClick={() => setStep(1)} style={{ marginTop: 28 }}>
                  Let's go
                </button>
              </div>
            )}

            {step === 1 && (
              <div className="fade-up">
                <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 4, fontFamily: "'DM Sans', sans-serif", fontStyle: 'italic' }}>
                  Recommended
                </p>
                <label className="settings-label" style={{ fontSize: 16 }}>Gemini API Key</label>
                <p className="settings-hint" style={{ marginBottom: 16 }}>
                  Gives you natural-sounding Korean pronunciation. The free tier is all you need.
                </p>
                <input
                  className="settings-input"
                  type="password"
                  placeholder="AIza..."
                  value={geminiInput}
                  onChange={e => setGeminiInput(e.target.value)}
                  autoFocus
                />
                <p style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 8, lineHeight: 1.5 }}>
                  Get one free at{' '}
                  <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener"
                    style={{ color: 'var(--accent-warm)', textDecoration: 'underline' }}>
                    aistudio.google.com
                  </a>
                </p>
                <div style={{ display: 'flex', gap: 8, marginTop: 24 }}>
                  <button className="btn-secondary" onClick={() => setStep(2)} style={{ flex: 1 }}>
                    Skip for now
                  </button>
                  <button className="btn-primary" onClick={() => setStep(2)} style={{ flex: 1 }}
                    disabled={!geminiInput.trim()}>
                    Next
                  </button>
                </div>
              </div>
            )}

            {step === 2 && (
              <div className="fade-up">
                <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 4, fontFamily: "'DM Sans', sans-serif", fontStyle: 'italic' }}>
                  Optional
                </p>
                <label className="settings-label" style={{ fontSize: 16 }}>Anthropic API Key</label>
                <p className="settings-hint" style={{ marginBottom: 16 }}>
                  After you finish all 60 sessions, this lets the app generate new personalized sessions for you with Claude.
                </p>
                <input
                  className="settings-input"
                  type="password"
                  placeholder="sk-ant-..."
                  value={anthropicInput}
                  onChange={e => setAnthropicInput(e.target.value)}
                  autoFocus
                />
                <p style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 8, lineHeight: 1.5 }}>
                  You don't need this yet. You can always add it later in Settings.
                </p>
                <div style={{ display: 'flex', gap: 8, marginTop: 24 }}>
                  <button className="btn-secondary" onClick={finish} style={{ flex: 1 }}>
                    Skip
                  </button>
                  <button className="btn-primary" onClick={finish} style={{ flex: 1 }}>
                    Start learning
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── App ──────────────────────────────────────────────────────── */
    function App() {
      // Auto-start: returning users go straight into a session (skip homescreen)
      const _welcomed = load('welcomed', false);
      const _savedCompleted = load('completedSessions', []);
      const _hasRemaining = (window.SESSIONS || []).some(s => !_savedCompleted.includes(s.id));
      const _shouldAutoStart = _welcomed && _savedCompleted.length > 0 && _hasRemaining;

      const [view, setView] = useState(_shouldAutoStart ? 'session' : 'home');
      const [completedSessions, setCompletedSessions] = useStorage('completedSessions', []);
      const [mastery, setMastery] = useStorage('mastery', {});
      const [streak, setStreak] = useStorage('streak', 0);
      const [lastDate, setLastDate] = useStorage('lastSessionDate', null);
      const [currentSessionId, setCurrentSessionId] = useState(() => {
        if (!_shouldAutoStart) return null;
        // Resume in-progress session if checkpoint exists
        const cp = load('sessionCheckpoint', null);
        if (cp && cp.sessionId && !_savedCompleted.includes(cp.sessionId)) return cp.sessionId;
        const aboutYou = load('aboutYou', '');
        const interestMap = buildInterestMap(aboutYou);
        const ordered = getOrderedSessions(_savedCompleted, interestMap);
        if (ordered.length > 0) return ordered[0].id;
        return 1;
      });
      const [showWelcome, setShowWelcome] = useState(() => !_welcomed);

      function getNextId() {
        const aboutYou = load('aboutYou', '');
        const interestMap = buildInterestMap(aboutYou);
        const ordered = getOrderedSessions(completedSessions, interestMap);
        if (ordered.length > 0) return ordered[0].id;
        // Fallback: sequential if all done
        if (completedSessions.length === 0) return 1;
        return Math.max(...completedSessions) + 1;
      }

      function startSession() {
        setCurrentSessionId(getNextId());
        setView('session');
      }

      function recordCompletion(sid) {
        if (sid && !completedSessions.includes(sid)) {
          setCompletedSessions(prev => [...prev, sid]);
          const t = today();
          if (lastDate !== t) {
            const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
            setStreak(lastDate === yesterday ? s => s + 1 : 1);
            setLastDate(t);
          }
        }
      }

      function finishSession() {
        recordCompletion(currentSessionId);
        setView('home');
        setCurrentSessionId(null);
      }

      function handleMore() {
        recordCompletion(currentSessionId);
        // Use interest-aware ordering for next session
        const updatedCompleted = [...completedSessions, currentSessionId].filter((v, i, a) => a.indexOf(v) === i);
        const aboutYou = load('aboutYou', '');
        const interestMap = buildInterestMap(aboutYou);
        const ordered = getOrderedSessions(updatedCompleted, interestMap);
        setCurrentSessionId(ordered.length > 0 ? ordered[0].id : (currentSessionId || 0) + 1);
      }

      function replaySession(sessionId) {
        setCurrentSessionId(sessionId);
        setView('session');
      }

      function exitSession() {
        setView('home');
        setCurrentSessionId(null);
      }

      if (showWelcome) {
        return <WelcomeModal onComplete={() => setShowWelcome(false)} />;
      }

      if (view === 'settings') return <SettingsView onBack={() => setView('home')} />;
      if (view === 'lessonplan') {
        return (
          <LessonPlanView
            completedSessions={completedSessions}
            onBack={() => setView('home')}
            onStartSession={replaySession}
          />
        );
      }
      if (view === 'collection') {
        return (
          <CollectionView
            completedSessions={completedSessions}
            mastery={mastery}
            onBack={() => setView('home')}
            onStartSession={startSession}
            onReplaySession={replaySession}
          />
        );
      }
      if (view === 'session' && currentSessionId) {
        return (
          <SessionView
            key={currentSessionId}
            sessionId={currentSessionId}
            mastery={mastery}
            setMastery={setMastery}
            onFinish={finishSession}
            onMore={handleMore}
            onExit={exitSession}
            onSettings={() => { recordCompletion(currentSessionId); setCurrentSessionId(null); setView('settings'); }}
          />
        );
      }

      return (
        <HomeScreen
          completedSessions={completedSessions}
          mastery={mastery}
          streak={streak}
          onStartSession={startSession}
          onCollection={() => setView('collection')}
          onSettings={() => setView('settings')}
          onLessonPlan={() => setView('lessonplan')}
        />
      );
    }

    /* ── Mount ────────────────────────────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    /* ── Service Worker ───────────────────────────────────────────── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    /* ── Preload voices (fallback) ────────────────────────────────── */
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  </script>
</body>
</html>
